<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心语 SerenityMind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; overflow: hidden; }
        
        /* 情感律动背景核心样式 */
        .emotion-field {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            transition: background 3s ease-in-out;
            background-color: var(--bg-color-1, #f0f4ff);
        }

        .emotion-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            transition: all 5s ease-in-out;
            animation: breathe 15s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(5%, 5%); }
        }

        /* 预定义情感色调变量 */
        :root {
            /* Default/Listening - Soothing Blue */
            --listening-1: #f0f9ff; --listening-2: #e0f2fe; --listening-3: #bae6fd;
            /* Empathy - Warm Indigo/Lavender */
            --empathy-1: #f5f3ff; --empathy-2: #ede9fe; --empathy-3: #ddd6fe;
            /* Warm - Peach/Amber */
            --warm-1: #fffaf1; --warm-2: #fff4e6; --warm-3: #ffedd5;
            /* Guiding - Mint/Emerald */
            --guiding-1: #f0fdf4; --guiding-2: #dcfce7; --guiding-3: #bbf7d0;
        }

        .bg-listening { --bg-color-1: var(--listening-1); --blob-1: var(--listening-2); --blob-2: var(--listening-3); }
        .bg-empathy { --bg-color-1: var(--empathy-1); --blob-1: var(--empathy-2); --blob-2: var(--empathy-3); }
        .bg-warm { --bg-color-1: var(--warm-1); --blob-1: var(--warm-2); --blob-2: var(--warm-3); }
        .bg-guiding { --bg-color-1: var(--guiding-1); --blob-1: var(--guiding-2); --blob-2: var(--guiding-3); }
    </style>
